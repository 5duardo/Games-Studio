<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Studio — Lobby</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .lobby-page { height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }
    
    .lobby-header {
      padding: 24px 40px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    
    .lobby-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 32px;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 8px;
    }
    .lobby-subtitle { color: var(--text-secondary); font-size: 15px; }

    .lobby-body {
      flex: 1;
      display: flex;
      gap: 32px;
      padding: 32px 40px;
      overflow: hidden;
    }

    .lobby-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
      backdrop-filter: blur(20px);
    }

    .panel-header {
      padding: 16px 24px;
      background: rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Checkable Items */
    .check-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.03);
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition);
    }

    .check-item:hover { background: rgba(255,255,255,0.06); }
    .check-item.selected {
      background: rgba(99,102,241,0.1);
      border-color: var(--accent);
    }

    .check-box {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 12px; transition: var(--transition);
    }
    .check-item.selected .check-box {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-item.selected .check-box::after { content: '✓'; }

    .check-icon { font-size: 24px; }
    .check-info { flex: 1; }
    .check-title { font-weight: 600; font-size: 15px; }
    .check-desc { font-size: 12px; color: var(--text-muted); }

    .lobby-footer {
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <!-- bg-orbs removed -->

  <div class="titlebar">
    <span class="titlebar-title">Game Studio — Lobby</span>
    <div class="titlebar-controls">

      <button class="titlebar-btn minimize" id="btn-minimize"></button>
      <button class="titlebar-btn maximize" id="btn-maximize"></button>
      <button class="titlebar-btn close" id="btn-close"></button>
    </div>
  </div>

  <div class="page">
    <div class="lobby-page">
      <div class="lobby-header">
        <button class="btn btn-ghost" id="btn-back" style="position:absolute; left: 40px; top: 24px; padding: 6px 14px; font-size: 13px; font-weight: 600; border-radius: 99px;">
          <i data-lucide="home" style="width: 16px; height: 16px; margin-right: 4px;"></i> Atrás
        </button>
        <button class="btn btn-ghost" id="btn-admin" style="position:absolute; right: 40px; top: 24px; padding: 6px 14px; font-size: 13px; font-weight: 600; border-radius: 99px; background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); color: var(--accent-light);">
          <i data-lucide="database" style="width: 16px; height: 16px; margin-right: 4px;"></i> Base de Datos
        </button>
        <div class="lobby-title">Lobby de Partida</div>
        <div class="lobby-subtitle">Configura quiénes juegan y qué categorías habilitar</div>
      </div>

      <div class="lobby-body">
        <!-- Panel Equipos -->
        <div class="lobby-panel">
          <div class="panel-header">
            <span>1. Selecciona los Equipos</span>
            <span class="badge badge-accent" id="teams-count">0/0</span>
          </div>
          <div class="panel-list" id="teams-list"></div>
        </div>

        <!-- Panel Categorías -->
        <div class="lobby-panel">
          <div class="panel-header">
            <span>2. Selecciona las Categorías</span>
            <span class="badge badge-accent" id="cats-count">0/0</span>
          </div>
          <div class="panel-list" id="cats-list"></div>
        </div>
      </div>

      <div class="lobby-footer">
        <div class="text-muted" style="font-size:13px;" id="summary-text">
          Esperando selecciones...
        </div>
        <button class="btn btn-primary btn-lg" id="btn-start" disabled style="display:flex; align-items:center; gap:8px;">
          <i data-lucide="play" style="width: 18px; height: 18px;"></i> Iniciar Competencia
        </button>
      </div>
    </div>
  </div>

  <script src="js/lucide.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/lobby.js"></script>
  <script>
    if (window.lucide) {
      window.lucide.createIcons({ icons: window.lucide.icons });
    }
  </script>
</body>
</html>
